<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const DOC_CHUNKS = [
  { page: 1, section: "Abstract", text: "The integration of AI in education has transformed academic learning, offering both opportunities and challenges. Key findings include personalized learning, improved academic outcomes, and enhanced engagement, but also over-reliance, diminished critical thinking, and data privacy risks." },
  { page: 3, section: "Section 2.1 – Sample", text: "85 second-year students from Aerospace and Medical Engineering programs at POLITEHNICA Bucharest were selected using purposive, non-probabilistic sampling." },
  { page: 4, section: "Section 3 – Results", text: "95.6% of respondents use AI in academic activities. 88.2% use virtual assistants (ChatGPT, Siri, Google Assistant). 42.4% use AI-based educational platforms (Coursera, Duolingo)." },
  { page: 5, section: "Section 3 – Results (Frequency)", text: "57.6% of students use AI tools weekly. 18.8% use AI daily. 11.8% monthly, 11.8% rarely, and only 1.2% stated they do not use AI at all." },
  { page: 5, section: "Section 3 – Results (Perception)", text: "80% of students agree AI enhances their educational experience. 17.6% expressed uncertainty, and only 2.4% found AI of no benefit." },
  { page: 5, section: "Section 3 – Results (Performance)", text: "82.4% believe AI contributes to improved academic performance. 15.3% see no significant change, and 3.5% feel it limits knowledge acquisition." },
  { page: 5, section: "Section 3 – Concerns", text: "48.2% expressed concerns about incorrect or imprecise AI answers. 16.5% worried about negative impact on critical thinking. 16.5% concerned about over-dependence. 9.4% noted data privacy issues." },
  { page: 6, section: "Table 1 – Suggestions", text: "27 responses called for proper AI integration. 14 advocated limited/controlled use. 14 requested improved accuracy. 24 gave other suggestions including free tools and transparency." },
  { page: 7, section: "Table 2 – Benefits", text: "42 responses noted AI saves time; 24 noted optimization of comprehension; 16 noted information structuring." },
  { page: 8, section: "Table 3 – Challenges", text: "60 responses cited accuracy of information as primary challenge. 7 noted over-dependence. 6 cited various errors. 6 listed other challenges including privacy and lack of human interaction." },
  { page: 9, section: "Table 4 – Collaboration Impact", text: "51 responses noted positive impact on learning and collaboration. 15 noted negative impact (reduced critical thinking, lack of human interaction). 15 noted neutral impact." },
  { page: 10, section: "Section 4 – Discussion", text: "AI offers personalized learning, improved outcomes, and engagement. Challenges include over-reliance, diminished critical thinking, and risk of academic fraud. Institutions must adopt data protection measures." },
  { page: 11, section: "Section 5 – Conclusions & Recommendations", text: "Recommendations: Comprehensive training for educators and students. Clear validation protocols. Ethical and privacy policies. Longitudinal research with diverse samples. AI should complement rather than replace traditional teaching." },
  { page: 1, section: "Introduction", text: "Published: 11 March 2025. Study conducted at National University of Science and Technology POLITEHNICA Bucharest. Authors: Aniella Mihaela Vieriu & Gabriel Petrea." },
];

const SYSTEM_PROMPT = `You are a precise document intelligence assistant analyzing an academic paper titled "The Impact of Artificial Intelligence (AI) on Students' Academic Development" by Vieriu & Petrea (2025), published in Education Sciences.

STRICT RULES:
1. ONLY answer based on the document chunks provided. Never hallucinate or invent facts.
2. For EVERY claim, cite the exact Page number and Section name in square brackets like [Page X, Section: Y].
3. If information is not in the provided chunks, say: "This information is not found in the provided document excerpts."
4. Format your answer with clear structure using the document as your sole source of truth.
5. End every response with a "CITATIONS USED" block listing all cited pages and sections.
6. Your response must be factual, concise, and directly supported by the text.`;

const PRESETS = [
  "What percentage of students use AI tools weekly or daily?",
  "What are the top concerns students have about AI in education?",
  "What did the study recommend for institutions implementing AI?",
  "What types of AI tools are most popular among students?",
  "How does AI impact student collaboration with classmates?",
  "Who conducted this study and when was it published?",
];

const DASHBOARD_DATA = {
  risks: [
    { text: "Over-reliance on AI may diminish critical thinking and independent problem-solving", page: 8 },
    { text: "48.2% concern about incorrect or imprecise AI-generated answers", page: 5 },
    { text: "Academic dishonesty risk — AI may enable unauthorized completion of assignments", page: 2 },
    { text: "Data privacy risks and algorithmic bias in AI systems", page: 3 },
    { text: "Potential cognitive disengagement and reduced human interaction", page: 9 },
  ],
  dates: [
    { text: "Received: 6 February 2025", page: 1 },
    { text: "Revised: 5 March 2025", page: 1 },
    { text: "Accepted: 7 March 2025", page: 1 },
    { text: "Published: 11 March 2025", page: 1 },
    { text: "Ethical clearance per Declaration of Helsinki (study period 2024–2025)", page: 11 },
  ],
  stakeholders: [
    { text: "Aniella Mihaela Vieriu — Lead Author, Dept. of Teacher Training & Social Sciences", page: 1 },
    { text: "Gabriel Petrea — Co-Author, POLITEHNICA Bucharest", page: 1 },
    { text: "85 Second-Year Students (Aerospace & Medical Engineering)", page: 3 },
    { text: "POLITEHNICA Bucharest — Host Institution", page: 1 },
    { text: "Han Reichgelt — Academic Editor", page: 1 },
    { text: "MDPI / Education Sciences — Publisher", page: 1 },
  ]
};

function parseAnswer(raw) {
  const citationMatch = raw.match(/CITATIONS USED[:\s]*([\s\S]*?)$/i);
  const citations = citationMatch ? citationMatch[1].trim() : null;
  const answer = raw.replace(/CITATIONS USED[:\s]*[\s\S]*$/i, '').trim();
  const inlineCites = [...answer.matchAll(/\[Page\s*(\d+)[,\s]+Section:\s*([^\]]+)\]/gi)].map(m => `Page ${m[1]}, Section: ${m[2].trim()}`);
  const allCites = citations
    ? [...new Set([...inlineCites, ...citations.split('\n').map(s => s.replace(/^[-•*]\s*/, '').trim()).filter(Boolean)])]
    : [...new Set(inlineCites)];
  return { answer, allCites };
}

function LoadingDots() {
  return <div className="loading"><div className="spinner"/><span>Retrieving & generating grounded answer…</span></div>;
}

function DashboardTab() {
  return (
    <div className="dashboard">
      <div className="stats-row">
        {[
          { num: "95.6%", label: "AI Adoption Rate" },
          { num: "85", label: "Study Participants" },
          { num: "12", label: "Pages Analyzed" },
          { num: "4", label: "Key Themes" },
        ].map(s => (
          <div className="stat-box" key={s.label}>
            <div className="stat-num">{s.num}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>

      <div className="summary-box">
        <h3>Executive Summary</h3>
        <p>This study (Vieriu & Petrea, 2025) investigates AI's impact on academic development across 85 engineering students at POLITEHNICA Bucharest. Using mixed-methods design — structured questionnaires with thematic analysis — it finds overwhelming AI adoption (95.6%) with virtual assistants dominating (88.2%). Students report efficiency gains and personalized learning benefits, but significant concerns persist around information accuracy (48.2%), critical thinking erosion (16.5%), and over-dependence (16.5%). The authors call for structured frameworks, ethical guidelines, and institutional training programs.</p>
      </div>

      <div className="dash-grid">
        <div className="dash-card">
          <div className="dash-card-head">
            <div className="dash-card-icon icon-risk">⚠️</div>
            <div className="dash-card-title">Risks</div>
          </div>
          <div className="dash-card-body">
            {DASHBOARD_DATA.risks.map((r, i) => (
              <div className="dash-item" key={i}>
                <div className="dash-item-dot dot-risk" style={{marginTop:5}}/>
                <span style={{flex:1}}>{r.text}</span>
                <span className="cite-tag">p.{r.page}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="dash-card">
          <div className="dash-card-head">
            <div className="dash-card-icon icon-date">📅</div>
            <div className="dash-card-title">Dates</div>
          </div>
          <div className="dash-card-body">
            {DASHBOARD_DATA.dates.map((d, i) => (
              <div className="dash-item" key={i}>
                <div className="dash-item-dot dot-date" style={{marginTop:5}}/>
                <span style={{flex:1}}>{d.text}</span>
                <span className="cite-tag">p.{d.page}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="dash-card">
          <div className="dash-card-head">
            <div className="dash-card-icon icon-stake">👥</div>
            <div className="dash-card-title">Stakeholders</div>
          </div>
          <div className="dash-card-body">
            {DASHBOARD_DATA.stakeholders.map((s, i) => (
              <div className="dash-item" key={i}>
                <div className="dash-item-dot dot-stake" style={{marginTop:5}}/>
                <span style={{flex:1}}>{s.text}</span>
                <span className="cite-tag">p.{s.page}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function WorkflowTab() {
  const steps = [
    {
      title: "Document Ingestion & Chunking",
      desc: "The PDF is parsed and split into semantically meaningful chunks (by section/page). Each chunk is stored with metadata: page number, section title, and raw text. This enables precise retrieval.",
      code: `chunks = split_pdf(doc, strategy="section")
# Each chunk → { page, section, text, embedding }`
    },
    {
      title: "Vector Embedding & Indexing",
      desc: "Each chunk is encoded into a high-dimensional vector using an embedding model (e.g., text-embedding-3-small). Chunks are indexed in a vector store (Pinecone, FAISS, or Chroma) for semantic search.",
      code: `embeddings = embed(chunks)  # OpenAI / Cohere
index.upsert(embeddings)  # Pinecone / FAISS`
    },
    {
      title: "Semantic Retrieval",
      desc: "When a question arrives, it is embedded and the top-K most semantically similar chunks are retrieved from the index. Only these chunks are passed to the LLM — preventing hallucination from out-of-scope content.",
      code: `query_vec = embed(user_question)
top_chunks = index.query(query_vec, top_k=4)`
    },
    {
      title: "Grounded Generation (Citation-Forced Prompt)",
      desc: "The LLM receives ONLY the retrieved chunks + a strict system prompt requiring citation of page numbers for every fact. If the answer isn't in the chunks, the model must say so — zero hallucination tolerance.",
      code: `prompt = SYSTEM_PROMPT + "\\n\\nCHUNKS:\\n" + format(top_chunks)
response = claude.messages.create(model="claude-sonnet-4-20250514",
  messages=[{"role":"user","content": prompt + user_question}])`
    },
    {
      title: "Answer Rendering with Citations",
      desc: "The response is parsed to extract inline citations [Page X, Section Y] and a CITATIONS USED block. These are rendered in the UI with a confidence score and source audit trail.",
      code: `parsed = extract_citations(response)
render_answer(parsed.text, parsed.citations, parsed.confidence)`
    },
  ];
  return (
    <div className="workflow">
      <div className="summary-box" style={{marginBottom:28}}>
        <h3>RAG Pipeline Architecture</h3>
        <p>This tool simulates a production Retrieval-Augmented Generation (RAG) workflow. Unlike standard prompting, RAG grounds every AI response in retrieved document passages — eliminating hallucination by design. Each answer is traceable to a specific page and section.</p>
      </div>
      {steps.map((s, i) => (
        <React.Fragment key={i}>
          <div className="workflow-step">
            <div className="step-num">{i+1}</div>
            <div className="step-content">
              <div className="step-title">{s.title}</div>
              <div className="step-desc">{s.desc}</div>
              <div className="step-code">{s.code}</div>
            </div>
          </div>
          {i < steps.length - 1 && <div className="connector"/>}
        </React.Fragment>
      ))}
    </div>
  );
}

  const prompts = [
    {

      title: "Anti-Hallucination System Instruction",
      body: `You are a precise document intelligence assistant. You have been given specific excerpts from an academic paper.

STRICT RULES:
1. ONLY answer based on the document chunks provided to you.
2. Never invent, extrapolate, or assume facts not present in the text.
3. For EVERY factual claim, cite: [Page X, Section: Section Title]
4. If information is NOT in the provided chunks, respond:
   "This information is not found in the provided document excerpts."
5. End every answer with a "CITATIONS USED" block.
6. Be factual, concise, and directly sourced.`
    },
    {
      tag: "Retrieval Prompt",
      title: "Chunk-Grounded Query Template",
      body: `DOCUMENT CONTEXT (retrieved chunks):
---
{chunk_1}: [Page {p1}, Section: {s1}]
"{text_1}"

{chunk_2}: [Page {p2}, Section: {s2}]
"{text_2}"
---

USER QUESTION: {user_question}

Answer using ONLY the above chunks. Cite every fact with [Page X, Section: Y].`
    },
    {
      tag: "Extraction Prompt",
      title: "Dashboard Auto-Extraction (Risks / Dates / Stakeholders)",
      body: `Analyze the following document and extract structured data.

For each category below, list ALL relevant items with page citations:

1. RISKS — Any challenges, concerns, limitations, or negative outcomes
2. DATES — Any specific dates, publication timelines, or temporal references  
3. STAKEHOLDERS — All people, institutions, roles, and organizations mentioned

Format:
RISKS:
- [Risk description] → [Page X]

DATES:
- [Date/event] → [Page X]

STAKEHOLDERS:
- [Name/entity, role] → [Page X]

DOCUMENT TEXT: {full_document_text}`
    },
    {
      tag: "Validation Prompt",
      title: "Citation Verification & Confidence Scorer",
      body: `You are a citation verifier. Given an AI answer and the original document chunks, assess:

1. Is every cited [Page X, Section Y] accurate?
2. Are there any claims NOT supported by the document?
3. Rate the answer's grounding confidence from 0–100%.

Output:

CONFIDENCE SCORE: [0–100]%`
    },
  ];
  return (
    <div className="prompts">
      <div className="summary-box" style={{marginBottom:28}}>
        <h3>Engineered Prompt Library</h3>
        <p>These prompts enforce citation-first responses, eliminate hallucination through strict grounding rules, and structure the RAG pipeline. Each prompt serves a distinct role in the document intelligence workflow.</p>
      </div>
      {prompts.map((p, i) => (
        <div className="prompt-card" key={i}>
          <div className="prompt-head">
            <span className="prompt-tag">{p.tag}</span>
            <span className="prompt-title">{p.title}</span>
          </div>
          <div className="prompt-body">{p.body}</div>

function App() {
  const [tab, setTab] = useState("dashboard");
  const [question, setQuestion] = useState("");
  const [answers, setAnswers] = useState([]);
  const [loading, setLoading] = useState(false);

  async function askQuestion(q) {
    if (!q.trim()) return;
    setLoading(true);
    setTab("qa");

    const relevantChunks = DOC_CHUNKS.filter(chunk => {
      const kw = q.toLowerCase();
      return chunk.text.toLowerCase().split(' ').some(w => w.length > 4 && kw.includes(w)) ||
             chunk.section.toLowerCase().split(' ').some(w => w.length > 4 && kw.includes(w));
    }).slice(0, 5);

    const fallbackChunks = relevantChunks.length < 2
      ? DOC_CHUNKS.slice(0, 4)
      : relevantChunks;

    const chunksText = fallbackChunks.map(c =>
      `[Page ${c.page}, Section: ${c.section}]\n"${c.text}"`
    ).join("\n\n");

    const userMsg = `DOCUMENT CONTEXT (retrieved chunks):\n---\n${chunksText}\n---\n\nQUESTION: ${q}\n\nAnswer using ONLY the above chunks. Cite every fact with [Page X, Section: Section Name]. End with a CITATIONS USED block.`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: [{ role: "user", content: userMsg }]
        })
      });
      const data = await res.json();
      const raw = data.content?.map(b => b.text || "").join("\n") || "No response received.";
      const { answer, allCites } = parseAnswer(raw);
      const confidence = Math.min(98, 72 + allCites.length * 6);
      setAnswers(prev => [{ q, answer, allCites, confidence, ts: new Date().toLocaleTimeString() }, ...prev]);
    } catch(e) {
      setAnswers(prev => [{ q, answer: `Error: ${e.message}. Please check your API connection.`, allCites: [], confidence: 0, ts: new Date().toLocaleTimeString() }, ...prev]);
    }
    setLoading(false);
    setQuestion("");
  }

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      <div className="header">
        <div className="header-brand">
          <span>RAG</span> Document Intelligence
        </div>
        <div className="header-meta">
          Task 3: The Knowledge Analyst<br/>
          Aisha Tariq Khan · RAG Concepts
        </div>
      </div>

      <div className="app" style={{flex:1,overflow:'hidden'}}>
        {/* SIDEBAR */}
        <div className="sidebar">
          <div className="sidebar-title">📄 Active Document</div>
          <div className="doc-info">
            <div className="doc-title">The Impact of AI on Students' Academic Development</div>
            <div>
              <span className="doc-badge">Vieriu & Petrea 2025</span>
              <span className="doc-badge rust">12 Pages</span>
              <span className="doc-badge blue">Edu. Sciences</span>
            </div>
          </div>

          <div className="qa-section">
            <div className="qa-label">Ask the Document</div>
            <textarea
              className="qa-input"
              placeholder="Ask any question about the document…"
              value={question}
              onChange={e => setQuestion(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askQuestion(question); }}}
            />
            <button className="qa-btn" onClick={() => askQuestion(question)} disabled={loading || !question.trim()}>
              {loading ? <><div className="spinner" style={{width:12,height:12,borderWidth:2}}/> Retrieving…</> : "⚡ Retrieve & Answer"}
            </button>
          </div>

          <div className="presets">
            <div className="preset-label">Sample Questions</div>
            {PRESETS.map((p, i) => (
              <button className="preset-btn" key={i} onClick={() => askQuestion(p)} disabled={loading}>
                {p}
              </button>
            ))}
          </div>
        </div>

        {/* MAIN */}
        <div className="main">
          <div className="tabs">
            {[
              { id: "dashboard", label: "📊 Summary Dashboard" },
              { id: "qa", label: "💬 Q&A / Citations" },
              { id: "workflow", label: "🔄 RAG Workflow" },
              { id: "prompts", label: "✍️ Prompt Library" },
            ].map(t => (
              <div key={t.id} className={`tab ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
                {t.label}
              </div>
            ))}
          </div>

          <div style={{flex:1, overflowY:'auto'}}>
            {tab === "dashboard" && <DashboardTab />}
            {tab === "workflow" && <WorkflowTab />}
            {tab === "prompts" && <PromptsTab />}
            {tab === "qa" && (
              <div className="qa-panel">
                {loading && <LoadingDots />}
                {!loading && answers.length === 0 && (
                  <div className="empty">
                    <div className="empty-icon">🔍</div>
                    <div className="empty-text">Ask a question to see cited answers</div>
                  </div>
                )}
                {answers.map((a, i) => (
                  <div className="answer-card" key={i}>
                    <div className="answer-head">
                      <span style={{fontSize:'0.8rem'}}>❓</span>
                      <span className="answer-q">{a.q}</span>
                      <span style={{fontFamily:'IBM Plex Mono',fontSize:'0.62rem',opacity:0.4}}>{a.ts}</span>
                    </div>
                    <div className="answer-body">
                      <div className="answer-text" dangerouslySetInnerHTML={{__html:
                        a.answer.replace(/\[Page\s*(\d+)[,\s]+Section:\s*([^\]]+)\]/g,
                          '<span style="font-family:IBM Plex Mono;font-size:0.7rem;background:#fef9ed;border:1px solid #e8bf72;color:#c8973a;padding:1px 5px;border-radius:2px;font-weight:600;white-space:nowrap">[Page $1 · $2]</span>')
                      }}/>
                      {a.allCites.length > 0 && (
                        <div className="citation-block">
                          <div className="citation-title">📌 Citations Used</div>
                          {a.allCites.map((c, j) => (
                            <div className="citation-item" key={j}>{c}</div>
                          ))}
                          <div className="confidence-bar">
                            <span className="conf-label">Grounding Confidence</span>
                            <div className="conf-track">
                              <div className="conf-fill" style={{width: `${a.confidence}%`}}/>
                            </div>
                            <span className="conf-pct">{a.confidence}%</span>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      <div className="footer">
        <span>Task 3: The Knowledge Analyst — RAG Concepts · Aisha Tariq Khan</span>
        <span>Document: Vieriu & Petrea (2025) · Education Sciences 15(3), 343 · Grounded AI · No Hallucination</span>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
